{{ define "main" }}
  <article class="article">
    <header class="page-header">
      <p class="eyebrow">{{ .Section | default "Page" }}</p>
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p>{{ . }}</p>{{ end }}
    </header>
    <div class="content prose">
      {{ .Content }}
    </div>
  </article>
{{ end }}
